            "ENTP": {name:"辩论家", description:"机智、好奇、善于辩论。喜欢挑战，追求创新。", keywords:["机智","好奇","善于辩论","追求创新"]},
            "ESTJ": {name:"监督者", description:"果断、有组织能力、注重效率。善于管理，有领导力。", keywords:["果断","有组织能力","注重效率","有领导力"]},
            "ESFJ": {name:"照顾者", description:"热情、有责任心、关心他人。注重和谐，乐于助人。", keywords:["热情","有责任心","关心他人","注重和谐"]},
            "ENFJ": {name:"主人公", description:"有魅力、有领导力、关心他人。善于激励，追求共同成长。", keywords:["有魅力","有领导力","关心他人","善于激励"]},
            "ENTJ": {name:"指挥官", description:"果断、有远见、有领导力。善于战略规划，追求效率。", keywords:["果断","有远见","有领导力","战略思维"]}
        };
        
        let currentQuestion = 0;
        let answers = {};
        
        function startTest() {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('test-page').classList.remove('hidden');
            showQuestion();
        }
        
        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-number').textContent = `第 ${currentQuestion + 1} / ${questions.length} 题`;
            document.getElementById('question-text').textContent = q.text;
            document.getElementById('progress').style.width = `${(currentQuestion / questions.length) * 100}%`;
            
            const optionsHtml = q.options.map((opt, idx) => `
                <button class="option-btn" onclick="selectOption(${idx}, '${opt.type}')">
                    ${opt.text}
                </button>
            `).join('');
            
            document.getElementById('options').innerHTML = optionsHtml;
        }
        
        function selectOption(idx, type) {
            // 记录答案
            const dimension = questions[currentQuestion].id <= 15 ? 'EI' :
                             questions[currentQuestion].id <= 30 ? 'SN' :
                             questions[currentQuestion].id <= 45 ? 'TF' : 'JP';
            
            if (!answers[dimension]) answers[dimension] = {E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0};
            answers[dimension][type]++;
            
            // 下一题
            currentQuestion++;
            
            if (currentQuestion >= questions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }
        
        function calculateType() {
            let type = '';
            
            // E/I
            type += (answers.EI.E > answers.EI.I) ? 'E' : 'I';
            // S/N
            type += (answers.SN.S > answers.SN.N) ? 'S' : 'N';
            // T/F
            type += (answers.TF.T > answers.TF.F) ? 'T' : 'F';
            // J/P
            type += (answers.JP.J > answers.JP.P) ? 'J' : 'P';
            
            return type;
        }
        
        function showResult() {
            const type = calculateType();
            const typeInfo = types[type];
            
            document.getElementById('test-page').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            
            document.getElementById('result-type').textContent = type;
            document.getElementById('result-name').textContent = typeInfo.name;
            document.getElementById('result-description').textContent = typeInfo.description;
            
            const keywordsHtml = typeInfo.keywords.map(kw => `<span class="keyword">${kw}</span>`).join('');
            document.getElementById('result-keywords').innerHTML = keywordsHtml;
        }
    </script>
</body>
</html>
